<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body class="bodi">
    <header>
        <nav class="navlog">
            <img id="dogtris" src="assets/bido.png" alt="Cachorro triste">
            <h2>Formulario de adoção</h2>
            <img id="dog" src="assets/patas.webp" alt="Cachorro">
        </nav>
    </header>
    <main>
        <section class="logzin">
            <form id="form">
                <label for="nome">Nome</label><br>
                <input type="text" id="nome" placeholder="Digite seu nome completo"> <br>

                <label for="cpf">CPF</label><br>
                <input type="text" id="cpf" placeholder="Digite seu CPF"> <br>

                <label for="idade">Idade</label><br>
                <input type="number" id="idade" placeholder="Digite sua idade"> <br>

                <label for="cidade">Cidade</label><br>
                <input type="text" id="cidade" placeholder="Digite sua cidade"> <br>

                <label for="email">Email</label><br>
                <input type="text" id="email" placeholder="Digite seu email"> <br>

                <label for="nascimento">Nascimento</label><br>
                <input type="date" id="data" placeholder="Digite a data de nascimento"><br>

                <label for="numero">Número</label><br>
                <input type="tel" id="numero" placeholder="Digite seu numero"><br>

                <label for="endereco">Endereco</label><br>
                <input type="text" id="endereco" placeholder="Digite Endereço"> <br>

                <label for="moradia">Moradia:</label>
                <select name="moradia" id="moradia">
                    <option value="">Selecione</option>
                    <option value="Casa">Casa</option>
                    <option value="Apartamento">Apartamento</option>
                </select>

                <br>
                <label for="quintal">Possui quintal?</label> <br>
                <input type="radio" name="quintal" value="sim">Sim
                <input type="radio" name="quintal" value="nao">Não <br>

                <label for="pet">Já teve pet?</label> <br>
                <input type="radio" name="pet" value="sim">Sim
                <input type="radio" name="pet" value="nao">Não <br>

                <label for="horas">Tempo que o animal fica sozinho?</label><br>
                <input type="number" id="horas" placeholder="Digite o tempo"> <br>

                <label for="motivo">Motivo de adotar?</label><br>
                <input type="text" id="motivo" placeholder="Fale o motivo"> <br>

                <label for="termos">Aceita os termos?</label><br>
                <input type="checkbox" name="termos" value="Sim"> <br>

                <button id="botao2" type="submit">Enviar!</button>
            </form>
        </section>
    </main>
    <footer>

    </footer>
</body>
 <script src="java.js"></script>
</html>
